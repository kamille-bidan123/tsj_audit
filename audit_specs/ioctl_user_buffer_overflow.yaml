name: ioctl_user_buffer_overflow
user_prompt: |
  ## ioctl 用户态触发缓冲区溢出专项任务
  请基于公共 system prompt 中的入口函数、Function Skill 和 Code Map，判断当前 ioctl 入口中，是否存在内核读取、复制、解析或使用用户态传入数据后可能引起的缓冲区溢出、越界写、越界读或相关内存破坏问题。

  审计范围应保持开放：只要当前 ioctl 路径中存在来自用户态的数据进入内核，并影响缓冲区大小、分配大小、复制长度、索引、偏移、字符串长度、结构体数组数量、解析循环或后续内存访问边界，都应纳入审计。不要只局限于固定 API 名称或固定代码模式。

  重点关注：
  - 用户态可控的 `cmd`、`arg`、用户结构体字段、长度字段、索引、偏移、数组数量、字符串长度、嵌套指针、compat 结构体字段或协议载荷字段，是否能影响内核缓冲区访问边界。
  - 内核读取用户态数据的所有方式，包括但不限于 `copy_from_user`、`copy_to_user`、`get_user`、`put_user`、`copy_{to,from}_iter`、`strncpy_from_user`、`memdup_user`、`import_iovec`、项目封装的 user copy/helper，以及先 copy 到内核临时结构体后再继续使用其中字段的间接路径。
  - 目标或源缓冲区大小是否与用户可控长度、索引、偏移、数组数量、字符串长度或解析后的字段一致，尤其关注栈缓冲区、固定大小结构体字段、固定数组、kmalloc/kzmalloc/vmalloc 分配缓冲区、ioctl 私有上下文缓冲区和设备驱动内部缓存。
  - 是否存在整数溢出、截断、符号扩展、单位换算错误、结构体大小不匹配、32/64 位 compat ioctl 差异、`sizeof(pointer)` 误用、对齐/取整错误或 length/count 加法、乘法溢出，导致分配大小、校验大小或实际复制/访问大小不一致。
  - 重点关注 `kzmalloc(input_from_user * size)`、`kmalloc(user_count * sizeof(...))`、`kcalloc`/`kvcalloc` 参数计算、`vmalloc(user_len * elem_size)` 或项目封装分配函数中，用户态可控长度、数量、元素大小、结构体数量参与乘法或加法后可能发生整数溢出，导致实际分配缓冲区偏小。
  - 对分配偏小场景，继续追踪后续 `copy_from_user`、`memcpy`、循环逐项写入、结构体数组初始化、字符串复制、解析填充或设备状态更新是否仍按未溢出的用户语义长度执行，从而造成堆溢出、越界写或相邻对象破坏。
  - 是否存在先校验一个长度或指针，后续实际使用另一个用户可控字段、二级指针、偏移或变更后的长度，导致校验与使用不一致。
  - 是否存在字符串未保证 NUL 结尾、固定缓冲区拼接、格式化输出长度错误，导致越界写、越界读或信息泄露。
  - 是否存在循环按用户可控 count 写入数组、逐项复制用户数据或解析可变长结构时缺少上界检查。

  审计要求：
  - 必须从当前 ioctl 入口的用户态输入开始追踪，说明用户如何控制长度、索引、偏移、指针、结构体字段或数据内容，并如何到达具体缓冲区访问 sink。
  - 必须明确指出目标缓冲区的实际容量、用户可控访问长度或索引范围、已有校验条件，以及为什么校验不足以防止越界。
  - 如果风险来自整数溢出（加法、乘法、移位、对齐、取整或单位换算），必须关注参与计算的数据类型、位宽、有无符号属性、C 整数提升/转换规则、目标赋值类型和架构相关差异，判断是否存在真实溢出风险；不要只因为表达式形如 `a + b` 或 `a * b` 就下结论。
  - 对整数溢出要给出可行的取值范围和类型推理。例如用户态来的 `uint16` 与 `uint32` 相加后保存在足够宽的 `uint32`/`size_t` 且有合理上界时，通常不能直接判定为溢出；只有当类型宽度、转换、截断或赋值目标确实允许回绕/截断，并能导致分配或校验偏小时，才判定为漏洞。
  - 如果漏洞来自分配大小计算溢出，必须说明分配表达式、参与计算字段的数据类型、溢出前后的尺寸关系、实际分配大小，以及后续写入/复制为何超过该实际分配大小。
  - 区分“可能的代码风格风险”和“可由用户态触发的漏洞”：只有能证明当前 ioctl 调用路径中用户态输入可达越界读写、内核栈/堆溢出、内核崩溃、信息泄露或权限提升前置条件时，才判定为漏洞。
  - 如果存在完整的长度上界检查、分配大小与复制大小一致、索引边界受限、字符串正确截断/终止，或危险代码不可由当前 ioctl 入口触发，应返回无漏洞或低置信度。
