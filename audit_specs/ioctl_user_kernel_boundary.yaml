name: ioctl_user_kernel_boundary
user_prompt: |
  ## ioctl 用户/内核边界绕过专项任务
  请基于公共 system prompt 中的入口函数、Function Skill 和 Code Map，判断 ioctl 入口是否存在用户/内核地址空间隔离被绕过或削弱的问题。

  重点关注两类模式：

  1. `__get_user` / `__put_user` 等非完整检查接口使用不当
  - `__get_user`、`__put_user`、`__copy_from_user`、`__copy_to_user` 通常假设调用方已经完成有效的用户指针范围检查。
  - 检查调用前是否存在与目标指针、长度、访问方向一致的 `access_ok` 或等价校验。
  - 关注校验对象是否和实际访问对象一致，例如校验了 `arg`，但实际访问的是用户结构体中的二级指针。
  - 关注校验长度是否覆盖实际访问长度，是否存在整数溢出、截断、结构体大小不一致或数组越界。
  - 关注检查与使用之间是否能被用户态或并发路径改变，导致 TOCTOU。
  - 如果代码使用 `get_user`、`copy_from_user` 等带内置访问检查的接口，不应仅因缺少显式 `access_ok` 判定为漏洞；需要结合具体内核版本、封装语义和调用路径判断。

  2. `set_fs` 未恢复或错误恢复导致隔离绕过
  - 检查 ioctl 路径中是否调用 `set_fs(KERNEL_DS)`、`set_fs(USER_DS)` 或项目封装的地址限制切换逻辑。
  - 关注 `set_fs(KERNEL_DS)` 后是否在所有正常路径、错误路径、提前返回路径和异常分支中恢复原始地址限制，例如 `old_fs = get_fs(); ... set_fs(old_fs);`。
  - 关注恢复顺序是否正确，是否在调用用户可控 helper、回调、文件操作、copy/user API 前仍处于 `KERNEL_DS`。
  - 关注锁、goto cleanup、嵌套调用、递归调用和多分支错误处理是否可能导致地址限制泄漏到后续代码。
  - 如果 `set_fs` 状态泄漏后用户可控指针可被当作内核地址访问，或后续 `copy_from_user` / `copy_to_user` / `__get_user` / `__put_user` 的用户指针边界检查被绕过，应判定为高风险。
  - 对较新内核中不存在或已移除 `set_fs` 的代码，不要臆测漏洞；只有当前代码实际存在该模式或等价封装时才判定。

  审计要求：
  - 从当前 ioctl 入口的 `cmd`、`arg` 和从用户空间读取出的字段开始追踪，不要全局扫描到危险 API 就直接下结论。
  - 必须说明用户可控指针如何到达未检查的 `__get_user`/`__put_user` 路径，或 `set_fs` 未恢复后如何影响后续用户/内核地址访问。
  - 区分“代码风格风险”和“可利用漏洞”：只有能证明当前入口外部输入可达边界绕过路径，并可能造成越界读写、任意内核地址访问、信息泄露、权限绕过或内核崩溃时，才判定为漏洞。
  - 如果存在完整 `access_ok` 校验、长度边界校验、所有路径恢复 `set_fs`、或危险代码不可由当前 ioctl 入口触发，应返回无漏洞或低置信度。
