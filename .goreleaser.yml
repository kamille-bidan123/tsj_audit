version: 2

project_name: tsj-audit

before:
  hooks:
    - go mod tidy

builds:
  - id: tsj-audit
    main: ./cmd/tsj-audit
    binary: tsj-audit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: export-results
    main: ./cmd/export-results
    binary: export-results
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: manage-extensions
    main: ./cmd/manage-extensions
    binary: manage-extensions
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: civetweb-audit
    main: ./cmd/civetweb_audit
    binary: civetweb_audit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: ioctl-audit
    main: ./cmd/ioctl_audit
    binary: ioctl_audit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: verify-go-refactor
    main: ./cmd/verify-go-refactor
    binary: verify-go-refactor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: skills
    meta: true
    name_template: skill
    formats:
      - zip
    files:
      - src: skills/**/*.md
        dst: skills
      - src: skills/**/*.py
        dst: skills

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
